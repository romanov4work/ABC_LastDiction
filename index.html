<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прокачай Речь</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Заголовок игры (всегда виден) -->
    <h1 class="game-title">🎤 Прокачай Речь</h1>

    <!-- Экран запроса микрофона -->
    <div id="micPermissionScreen" class="screen active">
        <div class="permission-box">
            <p>Для игры нужен доступ к микрофону</p>
            <button id="requestMicBtn" class="btn-primary">Разрешить микрофон</button>
        </div>
    </div>

    <!-- Экран отказа в доступе -->
    <div id="micDeniedScreen" class="screen">
        <div class="permission-box">
            <p>Для этой игры нужен микрофон</p>
            <p class="small">Пожалуйста, разрешите доступ к микрофону в настройках браузера</p>
            <button id="retryMicBtn" class="btn-secondary">Попробовать снова</button>
        </div>
    </div>

    <!-- Главный экран игры (только облака после разрешения) -->
    <div id="gameScreen" class="screen">
        <div class="game-container">
            <p>Здесь будут уровни...</p>
        </div>
    </div>

    <!-- Дополнительные облака -->
    <div class="cloud cloud-1">☁️</div>
    <div class="cloud cloud-2">☁️</div>
    <div class="cloud cloud-3">☁️</div>
    <div class="cloud cloud-4">☁️</div>

    <!-- Номер деплоя -->
    <div class="deploy-version">v1.1.0</div>

    <script src="game.js"></script>
</body>
</html>
