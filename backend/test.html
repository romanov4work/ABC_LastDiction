<!DOCTYPE html>
<html>
<head>
    <title>Whisper API Test</title>
</head>
<body>
    <h1>Тест Whisper API</h1>
    <button id="testBtn">Проверить API</button>
    <pre id="result"></pre>

    <script>
        document.getElementById('testBtn').addEventListener('click', async () => {
            const result = document.getElementById('result');
            result.textContent = 'Проверяем...';

            try {
                // Проверяем /health
                const healthResponse = await fetch('http://localhost:5000/health');
                const healthData = await healthResponse.json();

                result.textContent = 'Успех!\n\n' + JSON.stringify(healthData, null, 2);

            } catch (error) {
                result.textContent = 'Ошибка:\n\n' + error.message + '\n\n' + error.stack;
            }
        });
    </script>
</body>
</html>
